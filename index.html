<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chubby Cattle — Value Scoreboard</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --carpet-base: #1a0a2e;
    --carpet-mid: #2d1b4e;
    --led-red: #ff1a1a;
    --led-green: #39ff14;
    --led-amber: #ffbf00;
    --neon-pink: #ff2d95;
    --neon-teal: #00e5ff;
    --neon-yellow: #ffe600;
    --steel: #3a3a3a;
    --steel-light: #5a5a5a;
    --chrome: #b0b0b0;
    --board-bg: #111;
    --section-bg: rgba(0,0,0,0.55);
    --white: #f0f0e8;
    --gold: #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--carpet-base);
    background-image:
      radial-gradient(circle 6px at 15% 20%, var(--neon-pink) 0%, var(--neon-pink) 5px, transparent 6px),
      radial-gradient(circle 4px at 75% 12%, var(--neon-teal) 0%, var(--neon-teal) 3px, transparent 4px),
      radial-gradient(circle 5px at 45% 80%, var(--neon-yellow) 0%, var(--neon-yellow) 4px, transparent 5px),
      radial-gradient(circle 3px at 88% 65%, var(--led-green) 0%, var(--led-green) 2px, transparent 3px),
      radial-gradient(circle 5px at 25% 55%, var(--neon-teal) 0%, var(--neon-teal) 4px, transparent 5px),
      radial-gradient(circle 4px at 60% 40%, var(--neon-pink) 0%, var(--neon-pink) 3px, transparent 4px),
      radial-gradient(circle 3px at 92% 30%, var(--neon-yellow) 0%, var(--neon-yellow) 2px, transparent 3px),
      radial-gradient(circle 6px at 8% 90%, var(--led-green) 0%, var(--led-green) 5px, transparent 6px),
      radial-gradient(circle 4px at 50% 10%, var(--neon-pink) 0%, var(--neon-pink) 3px, transparent 4px),
      radial-gradient(circle 3px at 35% 35%, var(--neon-yellow) 0%, var(--neon-yellow) 2px, transparent 3px),
      radial-gradient(circle 5px at 70% 75%, var(--neon-teal) 0%, var(--neon-teal) 4px, transparent 5px),
      radial-gradient(circle 4px at 5% 50%, var(--neon-yellow) 0%, var(--neon-yellow) 3px, transparent 4px),
      linear-gradient(135deg, transparent 40%, rgba(255,45,149,0.04) 40%, rgba(255,45,149,0.04) 42%, transparent 42%),
      linear-gradient(225deg, transparent 45%, rgba(0,229,255,0.04) 45%, rgba(0,229,255,0.04) 47%, transparent 47%),
      linear-gradient(315deg, transparent 50%, rgba(255,230,0,0.03) 50%, rgba(255,230,0,0.03) 52%, transparent 52%),
      linear-gradient(180deg, var(--carpet-base) 0%, var(--carpet-mid) 50%, var(--carpet-base) 100%);
    background-size:
      200px 200px, 200px 200px, 200px 200px, 200px 200px,
      200px 200px, 200px 200px, 200px 200px, 200px 200px,
      200px 200px, 200px 200px, 200px 200px, 200px 200px,
      300px 300px, 300px 300px, 300px 300px, 100% 100%;
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 10px;
  }

  /* ── Scene: Cow + People ── */
  .scene-wrap { display:flex;align-items:flex-end;justify-content:center;margin:14px auto 6px;gap:4px; }
  .people-group { display:flex;gap:3px;align-items:flex-end; }
  .pixel-cow-wrap { width:168px;height:154px;overflow:hidden;image-rendering:pixelated;flex-shrink:0; }
  .pixel-cow { width:1px;height:1px;background:transparent;transform:scale(7);transform-origin:top left; }
  .person-wrap { width:20px;height:40px;overflow:hidden;image-rendering:pixelated; }
  .person-px { width:1px;height:1px;background:transparent;transform:scale(4);transform-origin:top left; }

  /* ── Modal Overlay ── */
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto; }
  .modal-overlay.hidden { display:none; }
  .modal-box {
    background:linear-gradient(180deg,#1e0e36,#0a0a0a);
    border:3px solid var(--gold);border-radius:12px;
    padding:28px 20px;max-width:420px;width:100%;text-align:center;
    box-shadow:0 0 60px rgba(255,215,0,0.2),0 0 80px rgba(75,30,130,0.4),0 0 120px rgba(0,0,0,0.8);
    animation:modalPop .35s ease-out;
  }
  .modal-box.wide { max-width:760px; }
  @keyframes modalPop { 0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1} }
  .modal-box h2 { font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,16px);color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.5);margin-bottom:6px;line-height:1.6; }
  .modal-box .modal-sub { font-family:'Orbitron',sans-serif;font-size:clamp(9px,2vw,12px);color:var(--chrome);margin-bottom:20px;letter-spacing:2px; }
  .modal-box .modal-question { font-family:'Share Tech Mono',monospace;font-size:clamp(13px,3vw,18px);color:var(--white);margin-bottom:20px;line-height:1.5; }
  .modal-buttons { display:flex;gap:14px;justify-content:center;flex-wrap:wrap; }
  .modal-btn {
    font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,12px);
    padding:14px 24px;border:2px solid;border-radius:6px;cursor:pointer;
    transition:all .15s;min-width:130px;-webkit-tap-highlight-color:transparent;
  }
  .modal-btn.yes { background:var(--led-green);color:#000;border-color:var(--led-green); }
  .modal-btn.yes:hover { box-shadow:0 0 20px rgba(57,255,20,.5); }
  .modal-btn.no { background:transparent;color:var(--led-amber);border-color:var(--led-amber); }
  .modal-btn.no:hover { box-shadow:0 0 20px rgba(255,191,0,.3); }
  .modal-price-hint { font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.5vw,10px);display:block;margin-top:6px;opacity:.8; }
  .modal-btn.yes .modal-price-hint { color:#064006; }
  .modal-btn.no .modal-price-hint { color:var(--steel-light); }

  /* ── Tier Cards ── */
  .tier-cards { display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px; }
  .tier-card {
    background:#1a0e2e;border:2px solid #4a2d7a;border-radius:10px;
    padding:16px 14px;flex:1;min-width:180px;max-width:230px;cursor:pointer;
    transition:all .2s;text-align:center;
  }
  .tier-card:hover { border-color:var(--gold);box-shadow:0 0 18px rgba(255,215,0,.2); }
  .tier-card .tc-name { font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,14px);margin-bottom:8px;line-height:1.4; }
  .tier-card .tc-price { font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(18px,4vw,28px);margin-bottom:4px; }
  .tier-card .tc-orig { font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--steel-light);text-decoration:line-through;margin-bottom:8px; }
  .tier-card .tc-feat { font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.8vw,11px);color:var(--chrome);line-height:1.5;text-align:left; }
  .tier-card.silver .tc-name { color:#c0c0c0; }
  .tier-card.gold .tc-name { color:var(--gold); }
  .tier-card.diamond .tc-name { color:#b9f2ff; }
  .tier-card.silver .tc-price { color:#c0c0c0; }
  .tier-card.gold .tc-price { color:var(--gold); }
  .tier-card.diamond .tc-price { color:#b9f2ff; }
  .tier-card.recommended { border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.15); }
  .tier-card.recommended::before {
    content:'★ RECOMMENDED';display:block;
    font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);
    margin-bottom:8px;letter-spacing:1px;
  }

  /* ── Timer Bar ── */
  .timer-bar {
    position:sticky;top:0;z-index:100;
    max-width:900px;margin:0 auto 6px;
    background:linear-gradient(180deg,#1a0e2e,#0a0a0a);
    border:3px solid #4a2d7a;border-radius:10px;
    overflow:hidden;display:none;
  }
  .timer-bar.visible { display:block; }
  .timer-inner { display:flex;align-items:center;justify-content:center;gap:clamp(8px,3vw,24px);padding:10px 12px;flex-wrap:wrap; }
  .timer-block { text-align:center; }
  .timer-label { font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.5vw,8px);color:var(--chrome);margin-bottom:4px;letter-spacing:1px; }
  .timer-digits {
    font-family:'Orbitron',sans-serif;font-weight:900;
    font-size:clamp(20px,5vw,36px);color:var(--led-green);
    text-shadow:0 0 14px currentColor;transition:color .3s;
    min-width:clamp(80px,20vw,140px);
  }
  .timer-digits.warning { color:var(--led-amber); }
  .timer-digits.expired { color:var(--led-red); }
  .timer-digits.pulse { animation:timerPulse 1s infinite; }
  @keyframes timerPulse { 0%,100%{opacity:1}50%{opacity:.3} }
  .timer-sep { font-family:'Orbitron',sans-serif;font-size:clamp(16px,4vw,28px);color:var(--steel-light);font-weight:900; }
  .start-timer-btn {
    font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,14px);
    color:#fff;background:var(--led-red);border:3px solid #ff4444;border-radius:8px;
    padding:14px 28px;cursor:pointer;letter-spacing:2px;
    box-shadow:0 4px 0 #990000,0 0 20px rgba(255,26,26,.3);
    transition:all .1s;-webkit-tap-highlight-color:transparent;
    display:block;margin:0 auto;
  }
  .start-timer-btn:active { transform:translateY(3px);box-shadow:0 1px 0 #990000; }
  .game-over-banner {
    font-family:'Press Start 2P',monospace;font-size:clamp(14px,4vw,24px);
    color:var(--led-red);text-align:center;padding:12px;
    animation:timerPulse .5s infinite;text-shadow:0 0 20px var(--led-red);
    display:none;
  }

  /* ── Scoreboard ── */
  .scoreboard-frame {
    max-width:900px;margin:0 auto;border:4px solid #4a2d7a;border-radius:12px;
    background:var(--board-bg);box-shadow:0 0 40px rgba(75,30,130,.5),0 0 80px rgba(0,0,0,.8),inset 0 0 30px rgba(0,0,0,.5);
    overflow:hidden;
  }
  .scoreboard-frame.locked { pointer-events:none;opacity:.35;filter:blur(2px); }
  .header { background:linear-gradient(180deg,#1e0e36,#111);border-bottom:3px solid #4a2d7a;padding:18px 16px 12px;text-align:center; }
  .header h1 { font-family:'Press Start 2P',monospace;font-size:clamp(11px,3vw,18px);color:var(--gold);text-shadow:0 0 12px rgba(255,215,0,.6);letter-spacing:2px;line-height:1.6; }
  .header .subtitle { font-family:'Orbitron',sans-serif;font-size:clamp(9px,2vw,13px);color:var(--chrome);margin-top:6px;letter-spacing:3px;text-transform:uppercase; }
  .score-display { display:flex;justify-content:center;align-items:stretch;background:#0a0a0a;border-bottom:3px solid #4a2d7a; }
  .score-panel { flex:1;text-align:center;padding:16px 10px;border-right:2px solid var(--steel-light); }
  .score-panel:last-child { border-right:none; }
  .score-panel .label { font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);color:var(--chrome);margin-bottom:8px;letter-spacing:1px; }
  .score-panel .value { font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(22px,6vw,42px);text-shadow:0 0 16px currentColor;transition:color .3s; }
  .value-food { color:var(--led-green); }
  .value-cost { color:var(--led-red); }
  .value-net.positive { color:var(--led-green); }
  .value-net.negative { color:var(--led-red); }
  .sections { padding:10px; }
  .section { background:rgba(20,8,40,0.7);border:2px solid #3a1f65;border-radius:8px;margin-bottom:12px;overflow:hidden; }
  .section-header { background:linear-gradient(90deg,#2a1548,#3d2066);padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none; }
  .section-header h2 { font-family:'Press Start 2P',monospace;font-size:clamp(8px,2vw,11px);color:var(--gold);letter-spacing:1px; }
  .section-header .section-total { font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(12px,2.5vw,16px);color:var(--led-green); }
  .section-header .toggle-icon { color:var(--chrome);font-size:14px;transition:transform .2s; }
  .section.collapsed .section-body { display:none; }
  .section.collapsed .toggle-icon { transform:rotate(-90deg); }
  .section-body { padding:8px; }
  .drink-category-header { font-family:'Orbitron',sans-serif;font-size:clamp(9px,2vw,11px);color:var(--led-amber);letter-spacing:2px;text-transform:uppercase;padding:10px 10px 4px;border-top:1px solid rgba(255,191,0,.15);margin-top:4px; }
  .drink-category-header:first-child { border-top:none;margin-top:0; }
  .selector-row { display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.07); }
  .selector-row:last-child { border-bottom:none; }
  .selector-row select { flex:1;background:#1a1a1a;color:var(--led-amber);border:1px solid var(--steel-light);border-radius:4px;padding:8px;font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,13px);cursor:pointer;appearance:auto; }
  .selector-row .sel-value { font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(13px,2.5vw,16px);color:var(--led-green);min-width:55px;text-align:right;flex-shrink:0; }
  .selector-label { font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.5vw,9px);color:var(--led-amber);padding:8px 10px 2px;letter-spacing:1px; }
  .item-row { display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.07);gap:6px; }
  .item-row:last-child { border-bottom:none; }
  .item-row:hover { background:rgba(255,255,255,.03); }
  .item-name { flex:1;font-size:clamp(10px,2.2vw,13px);color:var(--white);line-height:1.3; }
  .item-unit-price { font-size:clamp(9px,1.8vw,11px);color:var(--steel-light);min-width:38px;text-align:right;flex-shrink:0; }
  .item-controls { display:flex;align-items:center;flex-shrink:0; }
  .item-controls button { width:clamp(28px,7vw,36px);height:clamp(28px,7vw,36px);border:1px solid var(--steel-light);background:var(--steel);color:var(--white);font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;user-select:none;-webkit-tap-highlight-color:transparent; }
  .item-controls button:first-child { border-radius:4px 0 0 4px; }
  .item-controls button:last-child { border-radius:0 4px 4px 0; }
  .item-controls button:active { background:#4a2d7a; }
  .item-controls .count { width:clamp(28px,7vw,36px);height:clamp(28px,7vw,36px);background:#1a1a1a;border-top:1px solid var(--steel-light);border-bottom:1px solid var(--steel-light);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(12px,2.5vw,16px);color:var(--led-amber); }
  .item-row-total { font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(12px,2.5vw,15px);color:var(--led-green);min-width:50px;text-align:right;flex-shrink:0; }
  .drink-cost-tag { font-size:clamp(8px,1.6vw,10px);color:var(--led-red);min-width:45px;text-align:right;flex-shrink:0; }
  .footer { text-align:center;padding:12px;border-top:2px solid #4a2d7a;background:#0a0a0a; }
  .footer p { font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.5vw,8px);color:var(--steel-light);line-height:1.8; }
  .reset-btn { margin-top:10px;background:var(--led-red);color:#fff;border:none;border-radius:4px;padding:8px 20px;font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.5vw,9px);cursor:pointer;letter-spacing:1px; }
  .reset-btn:active { opacity:.7; }
  .portion-note { font-size:clamp(8px,1.5vw,10px);color:var(--steel-light);font-style:italic;padding:4px 10px 8px;line-height:1.5; }

  /* ── Finish Meal Button ── */
  .finish-btn {
    display:block;margin:14px auto 6px;
    font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,14px);
    color:#fff;background:linear-gradient(180deg,#f5a623,#e8871e);border:3px solid #ffd700;border-radius:10px;
    padding:16px 32px;cursor:pointer;letter-spacing:2px;
    box-shadow:0 4px 0 #b06a00,0 0 24px rgba(255,215,0,.3);
    transition:all .1s;-webkit-tap-highlight-color:transparent;
    text-shadow:1px 1px 0 rgba(0,0,0,.3);
  }
  .finish-btn:active { transform:translateY(3px);box-shadow:0 1px 0 #b06a00; }

  /* ── Finish Modal ── */
  .finish-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1001;display:flex;align-items:center;justify-content:center;padding:16px; }
  .finish-overlay.hidden { display:none; }
  .finish-box {
    background:linear-gradient(180deg,#1e0e36,#0a0a0a);
    border:3px solid var(--gold);border-radius:14px;
    padding:28px 22px;max-width:440px;width:100%;text-align:center;
    box-shadow:0 0 80px rgba(255,215,0,.25);animation:modalPop .35s ease-out;
  }
  .finish-box h2 { font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,18px);color:var(--gold);margin-bottom:16px;line-height:1.5; }
  .finish-score { font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(32px,8vw,56px);margin:12px 0;text-shadow:0 0 20px currentColor; }
  .finish-score.positive { color:var(--led-green); }
  .finish-score.negative { color:var(--led-red); }
  .finish-stats { font-family:'Share Tech Mono',monospace;font-size:clamp(11px,2.5vw,14px);color:var(--chrome);margin-bottom:20px;line-height:1.8; }
  .finish-input {
    width:100%;max-width:280px;padding:12px;margin:0 auto 16px;display:block;
    background:#1a1a1a;border:2px solid #4a2d7a;border-radius:6px;
    color:var(--gold);font-family:'Press Start 2P',monospace;font-size:clamp(10px,2.5vw,14px);
    text-align:center;outline:none;
  }
  .finish-input::placeholder { color:var(--steel-light);font-size:clamp(8px,2vw,11px); }
  .finish-input:focus { border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,.2); }
  .finish-save-btn {
    font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,12px);
    padding:12px 28px;border:2px solid var(--led-green);border-radius:6px;
    background:var(--led-green);color:#000;cursor:pointer;
    transition:all .15s;-webkit-tap-highlight-color:transparent;
  }
  .finish-save-btn:hover { box-shadow:0 0 20px rgba(57,255,20,.5); }
  .finish-skip-btn {
    font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,12px);
    padding:8px 16px;border:none;background:transparent;color:var(--steel-light);
    cursor:pointer;margin-top:8px;text-decoration:underline;display:block;margin-left:auto;margin-right:auto;
  }

  /* ── Leaderboard ── */
  .leaderboard {
    max-width:900px;margin:12px auto;border:3px solid #4a2d7a;border-radius:12px;
    background:#0a0a0a;box-shadow:0 0 30px rgba(75,30,130,.3);overflow:hidden;
  }
  .lb-header {
    background:linear-gradient(90deg,#2a1548,#3d2066);padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;
  }
  .lb-header h2 { font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.2vw,13px);color:var(--gold);letter-spacing:1px; }
  .lb-header .lb-toggle { color:var(--chrome);font-size:14px;transition:transform .2s; }
  .leaderboard.collapsed .lb-body { display:none; }
  .leaderboard.collapsed .lb-toggle { transform:rotate(-90deg); }
  .lb-body { padding:8px; }
  .lb-empty { text-align:center;padding:20px;font-family:'Share Tech Mono',monospace;color:var(--steel-light);font-size:clamp(10px,2vw,13px); }
  .lb-row {
    display:flex;align-items:center;padding:8px 10px;gap:8px;
    border-bottom:1px solid rgba(255,255,255,.07);
  }
  .lb-row:last-child { border-bottom:none; }
  .lb-rank {
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(14px,3vw,20px);
    min-width:36px;text-align:center;flex-shrink:0;
  }
  .lb-rank.gold { color:var(--gold); }
  .lb-rank.silver { color:#c0c0c0; }
  .lb-rank.bronze { color:#cd7f32; }
  .lb-rank.normal { color:var(--steel-light); }
  .lb-info { flex:1;min-width:0; }
  .lb-name { font-family:'Press Start 2P',monospace;font-size:clamp(8px,1.8vw,11px);color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
let isMember = true;
let activeTier = null;
let BASE_COST = 0;
let DATA = {};
let state = {};

/* ── Timer state ── */
let timerStarted = false;
let timerStartMs = 0;
let timerInterval = null;

/* ══════════════════════════════════════════
   MODAL FLOW
   ══════════════════════════════════════════ */
function chooseMembership(member) {
  isMember = member;
  document.getElementById("memberModal").classList.add("hidden");
  document.getElementById("tierModal").classList.remove("hidden");
  document.getElementById("tierModalSub").textContent = member ? "MEMBER PRICING" : "REGULAR PRICING";
  buildTierCards();
}

function buildTierCards() {
  const container = document.getElementById("tierCards");
  container.innerHTML = "";
  for (const [key, t] of Object.entries(TIERS)) {
    const price = isMember ? t.member : t.regular;
    const otherPrice = isMember ? t.regular : null;
    const card = document.createElement("div");
    card.className = `tier-card ${key}${key === 'gold' ? ' recommended' : ''}`;
    card.style.background = '#1a0e2e';
    card.innerHTML = `
      <div class="tc-name">${t.name}</div>
      <div class="tc-price">$${price % 1 === 0 ? price : price.toFixed(2)}</div>
      ${otherPrice ? `<div class="tc-orig">$${otherPrice.toFixed(2)}</div>` : '<div class="tc-orig">&nbsp;</div>'}
      <div class="tc-feat">${t.features.map(f => '• ' + f).join('<br>')}</div>
    `;
    card.addEventListener("click", () => chooseTier(key));
    container.appendChild(card);
  }
}

function chooseTier(tierKey) {
  activeTier = tierKey;
  const t = TIERS[tierKey];
  BASE_COST = isMember ? t.member : t.regular;
  DATA = t.build();

  document.getElementById("tierModal").classList.add("hidden");
  document.getElementById("scoreboard").classList.remove("locked");
  document.getElementById("timerBar").classList.add("visible");

  const tag = isMember ? "Member" : "Standard";
  document.getElementById("subtitleText").innerHTML =
    `${t.name} Tier (${tag}) &bull; AYCE Scoreboard`;

  initState();
  buildSections();
  calculateTotals();
}

/* ══════════════════════════════════════════
   DRINK HELPERS
   ══════════════════════════════════════════ */
function flatDrinkItems() {
  const r = [];
  if (DATA.drinks) DATA.drinks.categories.forEach(c => c.items.forEach(i => r.push(i)));
  return r;
}

/* ══════════════════════════════════════════
   STATE INIT / TOTALS
   ══════════════════════════════════════════ */
function initState() {
  state = { dropdowns: {}, counters: {} };
  for (const [key, sec] of Object.entries(DATA)) {
    if (sec.type === "dropdown") {
      state.dropdowns[key] = new Array(sec.picks || 1).fill(0);
    } else if (sec.type === "drinks") {
      flatDrinkItems().forEach((_, i) => { state.counters[`${key}_${i}`] = 0; });
    } else {
      sec.items.forEach((_, i) => { state.counters[`${key}_${i}`] = 0; });
    }
  }
}

function calculateTotals() {
  let foodValue = 0, extraCost = 0;
  for (const [key, sec] of Object.entries(DATA)) {
    if (sec.type === "dropdown") {
      state.dropdowns[key].forEach(idx => { foodValue += sec.items[idx].value; });
    } else if (sec.type === "drinks") {
      flatDrinkItems().forEach((item, i) => { extraCost += (state.counters[`${key}_${i}`] || 0) * item.cost; });
    } else {
      sec.items.forEach((item, i) => { foodValue += (state.counters[`${key}_${i}`] || 0) * item.value; });
    }
  }
  const totalCost = BASE_COST + extraCost;
  const net = foodValue - totalCost;
  document.getElementById("totalFoodValue").textContent = `$${foodValue}`;
  const costFmt = totalCost % 1 === 0 ? totalCost : totalCost.toFixed(2);
  document.getElementById("totalCost").textContent = `$${costFmt}`;
  const netEl = document.getElementById("netValue");
  const absNet = Math.abs(net);
  const netFmt = absNet % 1 === 0 ? absNet : absNet.toFixed(2);
  netEl.textContent = net >= 0 ? `+$${netFmt}` : `-$${netFmt}`;
  netEl.className = `value value-net ${net >= 0 ? 'positive' : 'negative'}`;
  updateSectionTotals();
}

function updateSectionTotals() {
  for (const [key, sec] of Object.entries(DATA)) {
    const el = document.getElementById(`section-total-${key}`);
    if (!el) continue;
    let total = 0;
    if (sec.type === "dropdown") {
      state.dropdowns[key].forEach(idx => { total += sec.items[idx].value; });
    } else if (sec.type === "drinks") {
      flatDrinkItems().forEach((item, i) => { total += (state.counters[`${key}_${i}`] || 0) * item.cost; });
      el.textContent = total > 0 ? `-$${total}` : "$0";
      el.style.color = total > 0 ? "var(--led-red)" : "var(--led-green)";
      return;
    } else {
      sec.items.forEach((item, i) => { total += (state.counters[`${key}_${i}`] || 0) * item.value; });
    }
    el.textContent = `+$${total}`;
  }
}

/* ══════════════════════════════════════════
   BUILD SECTIONS
   ══════════════════════════════════════════ */
function buildSections() {
  const container = document.getElementById("sectionsContainer");
  container.innerHTML = "";

  for (const [key, section] of Object.entries(DATA)) {
    const sec = document.createElement("div");
    sec.className = "section";
    const isDropdown = section.type === "dropdown";
    if (!isDropdown) sec.classList.add("collapsed");

    const header = document.createElement("div");
    header.className = "section-header";
    header.innerHTML = `<h2>${section.title}</h2><span style="display:flex;align-items:center;gap:10px;"><span class="section-total" id="section-total-${key}">$0</span><span class="toggle-icon">▼</span></span>`;
    header.addEventListener("click", () => sec.classList.toggle("collapsed"));
    sec.appendChild(header);

    const body = document.createElement("div");
    body.className = "section-body";

    if (isDropdown) {
      if (section.subtitle) {
        const sub = document.createElement("div");
        sub.className = "portion-note";
        sub.textContent = section.subtitle;
        body.appendChild(sub);
      }
      const picks = section.picks || 1;
      for (let p = 0; p < picks; p++) {
        if (picks > 1) {
          const lbl = document.createElement("div");
          lbl.className = "selector-label";
          lbl.textContent = `PICK ${p + 1}`;
          body.appendChild(lbl);
        }
        const row = document.createElement("div");
        row.className = "selector-row";
        const sel = document.createElement("select");
        sel.dataset.sectionKey = key;
        sel.dataset.pickIndex = p;
        section.items.forEach((item, i) => {
          const opt = document.createElement("option");
          opt.value = i;
          opt.textContent = item.value > 0 ? `${item.name}  (~$${item.value})` : item.name;
          sel.appendChild(opt);
        });
        const valSpan = document.createElement("span");
        valSpan.className = "sel-value";
        valSpan.id = `sel-value-${key}-${p}`;
        valSpan.textContent = "$0";
        sel.addEventListener("change", () => {
          const pi = parseInt(sel.dataset.pickIndex);
          state.dropdowns[key][pi] = parseInt(sel.value);
          const val = section.items[parseInt(sel.value)].value;
          valSpan.textContent = val > 0 ? `+$${val}` : "$0";
          calculateTotals();
        });
        row.appendChild(sel);
        row.appendChild(valSpan);
        body.appendChild(row);
      }

    } else if (section.type === "drinks") {
      let gi = 0;
      section.categories.forEach(cat => {
        const ch = document.createElement("div");
        ch.className = "drink-category-header";
        ch.textContent = cat.label;
        body.appendChild(ch);
        cat.items.forEach(item => {
          const cKey = `${key}_${gi}`;
          const row = document.createElement("div");
          row.className = "item-row";
          row.innerHTML = `<span class="item-name">${item.name}</span><span class="drink-cost-tag">-$${item.cost}/ea</span><div class="item-controls"><button data-key="${cKey}" data-dir="-1">−</button><div class="count" id="count-${cKey}">0</div><button data-key="${cKey}" data-dir="1">+</button></div><span class="item-row-total" id="rowtotal-${cKey}" style="color:var(--led-red)">$0</span>`;
          body.appendChild(row);
          gi++;
        });
      });
    } else {
      if (section.portionNote) {
        const note = document.createElement("div");
        note.className = "portion-note";
        note.textContent = section.portionNote;
        body.appendChild(note);
      }
      section.items.forEach((item, i) => {
        const cKey = `${key}_${i}`;
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `<span class="item-name">${item.name}</span><span class="item-unit-price">~$${item.value}</span><div class="item-controls"><button data-key="${cKey}" data-dir="-1">−</button><div class="count" id="count-${cKey}">0</div><button data-key="${cKey}" data-dir="1">+</button></div><span class="item-row-total" id="rowtotal-${cKey}">$0</span>`;
        body.appendChild(row);
      });
    }

    sec.appendChild(body);
    container.appendChild(sec);
  }

  container.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-key]");
    if (!btn) return;
    const cKey = btn.dataset.key;
    const dir = parseInt(btn.dataset.dir);
    state.counters[cKey] = Math.max(0, (state.counters[cKey] || 0) + dir);
    document.getElementById(`count-${cKey}`).textContent = state.counters[cKey];

    const sectionKey = cKey.substring(0, cKey.lastIndexOf("_"));
    const idx = parseInt(cKey.substring(cKey.lastIndexOf("_") + 1));
    const sectionData = DATA[sectionKey];
    const rowTotalEl = document.getElementById(`rowtotal-${cKey}`);

    if (sectionData.type === "drinks") {
      const cost = flatDrinkItems()[idx].cost;
      const total = state.counters[cKey] * cost;
      rowTotalEl.textContent = total > 0 ? `-$${total}` : "$0";
    } else {
      const total = state.counters[cKey] * sectionData.items[idx].value;
      rowTotalEl.textContent = total > 0 ? `+$${total}` : "$0";
    }
    calculateTotals();
  });
}

function resetAll() {
  if (!confirm("Reset the entire scoreboard?")) return;
  initState();
  buildSections();
  calculateTotals();
}

function getCurrentScore() {
  let foodValue = 0, extraCost = 0;
  for (const [key, sec] of Object.entries(DATA)) {
    if (sec.type === "dropdown") {
      state.dropdowns[key].forEach(idx => { foodValue += sec.items[idx].value; });
    } else if (sec.type === "drinks") {
      flatDrinkItems().forEach((item, i) => { extraCost += (state.counters[`${key}_${i}`] || 0) * item.cost; });
    } else {
      sec.items.forEach((item, i) => { foodValue += (state.counters[`${key}_${i}`] || 0) * item.value; });
    }
  }
  const totalCost = BASE_COST + extraCost;
  const net = foodValue - totalCost;
  let totalItems = 0;
  for (const v of Object.values(state.counters)) totalItems += v;
  return { foodValue, totalCost, extraCost, net, totalItems };
}

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#ff2d95','#00e5ff','#ffe600','#39ff14','#ffd700','#ff1a1a','#9944cc','#ff69b4'];
  const pieces = [];
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -1,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 12,
      opacity: 1
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx;
      p.vy += 0.08;
      p.y += p.vy;
      p.rot += p.rv;
      if (frame > 60) p.opacity = Math.max(0, p.opacity - 0.015);
      if (p.opacity <= 0) return;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (alive && frame < 200) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function saveScore() {
  const name = document.getElementById('finishName').value.trim() || 'ANONYMOUS';

    time: new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }),

function startNewMeal() {
  document.getElementById('scoreboard').classList.add('locked');
  document.getElementById('timerBar').classList.remove('visible');
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerStarted = false;
  document.getElementById('gameOverBanner').style.display = 'none';
  document.getElementById('memberModal').classList.remove('hidden');
}

function renderLeaderboard(lb) {
  if (lb === undefined) lb = cachedLeaderboard;
  const body = document.getElementById('lbBody');
  if (!lb.length) {
    body.innerHTML = '<div class="lb-empty">No scores yet. Finish a meal to get on the board!</div>';
    return;
  }
  let html = '';
  lb.forEach((e, i) => {
    const rank = i + 1;
    const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'normal';
    const absNet = Math.abs(e.net);
    const netFmt = absNet % 1 === 0 ? absNet : absNet.toFixed(2);
    const netStr = e.net >= 0 ? `+$${netFmt}` : `-$${netFmt}`;
    const netClass = e.net >= 0 ? 'positive' : 'negative';
    html += `<div class="lb-row">
      <div class="lb-rank ${rankClass}">#${rank}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(e.name)}</div>
        <div class="lb-meta">${e.tier} ${e.member ? '(M)' : ''} &bull; ${e.items} items &bull; ${e.date}</div>
      </div>
      <div class="lb-net ${netClass}">${netStr}</div>
    </div>`;
  });
  html += '<button class="lb-clear-btn" onclick="clearLeaderboard()">CLEAR LEADERBOARD</button>';
  body.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function clearLeaderboard() {
  if (!confirm('Clear the entire leaderboard?')) return;
  lbRef.remove();
}

lbRef.on('value', (snapshot) => {
  const data = snapshot.val();
  if (!data) { cachedLeaderboard = []; renderLeaderboard([]); return; }
  const lb = Object.values(data);
  lb.sort((a, b) => b.net - a.net);
  cachedLeaderboard = lb;
  renderLeaderboard(lb);
});

/* ══════════════════════════════════════════
   DINNER TIMER
   ══════════════════════════════════════════ */
const ORDER_DURATION = 70 * 60;
const DINNER_DURATION = 90 * 60;

function startTimer() {
  timerStarted = true;
  timerStartMs = Date.now();
  document.getElementById("startTimerBtn").style.display = "none";
  renderTimerDisplay();
  timerInterval = setInterval(tickTimer, 500);
}

function renderTimerDisplay() {
  const inner = document.getElementById("timerInner");
  inner.innerHTML = `
    <div class="timer-block">
      <div class="timer-label">ORDERING</div>
      <div class="timer-digits" id="orderDigits">${fmtTime(ORDER_DURATION)}</div>
    </div>
    <div class="timer-sep">│</div>
    <div class="timer-block">
      <div class="timer-label">DINNER</div>
      <div class="timer-digits" id="dinnerDigits">${fmtTime(DINNER_DURATION)}</div>
    </div>
  `;
}

function fmtTime(secs) {
  if (secs <= 0) return "00:00";
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function tickTimer() {
  const elapsed = Math.floor((Date.now() - timerStartMs) / 1000);
  const orderLeft = Math.max(0, ORDER_DURATION - elapsed);
  const dinnerLeft = Math.max(0, DINNER_DURATION - elapsed);

  const oEl = document.getElementById("orderDigits");
  const dEl = document.getElementById("dinnerDigits");
  if (!oEl || !dEl) return;

  if (orderLeft <= 0) {
    oEl.textContent = "CLOSED";
    oEl.className = "timer-digits expired pulse";
  } else {
    oEl.textContent = fmtTime(orderLeft);
    oEl.className = "timer-digits" + (orderLeft <= 300 ? " warning pulse" : "");
  }

  if (dinnerLeft <= 0) {
    dEl.textContent = "00:00";
    dEl.className = "timer-digits expired pulse";
    document.getElementById("gameOverBanner").style.display = "block";
    document.getElementById("timerInner").style.display = "none";
    clearInterval(timerInterval);
  } else {
    dEl.textContent = fmtTime(dinnerLeft);
    dEl.className = "timer-digits" + (dinnerLeft <= 300 ? " warning pulse" : "");
  }
}
